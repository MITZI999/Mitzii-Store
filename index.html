<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitzii Store | Digital Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <style>
        :root {
            --pink: #ff007f;
            --blue: #00d4ff;
            --green: #39ff14;
            --red: #ff3131;
            --bg: #030005;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: var(--bg);
            color: white;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 50%, #1a0033 0%, #030005 100%);
        }

        /* --- Animated Background Bubbles --- */
        .bg-blobs {
            position: fixed; width: 100%; height: 100%; z-index: -1;
            overflow: hidden; top: 0; left: 0;
        }
        .blob {
            position: absolute; width: 300px; height: 300px;
            background: var(--pink); filter: blur(150px);
            border-radius: 50%; opacity: 0.2; animation: move 20s infinite alternate;
        }
        .blob.blue { background: var(--blue); left: 70%; top: 20%; animation-delay: -5s; }
        .blob.green { background: var(--green); left: 10%; top: 60%; animation-delay: -10s; }

        @keyframes move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 200px); }
        }

        /* --- Floating Header --- */
        header {
            padding: 25px 5%;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(to right, var(--blue), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        /* --- Hero Section --- */
        .hero {
            padding: 100px 5%; text-align: center;
        }
        .hero h1 {
            font-size: clamp(40px, 10vw, 80px);
            font-weight: 800; line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--pink);
        }
        .hero p {
            color: var(--blue); font-size: 18px; letter-spacing: 3px;
            text-transform: uppercase; font-weight: 600;
        }

        /* --- Glass Container & Grid --- */
        .section { padding: 60px 5%; }
        .category-title {
            font-size: 32px; margin-bottom: 40px;
            display: flex; align-items: center; gap: 15px;
            color: var(--green); text-shadow: 0 0 10px var(--green);
        }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        /* --- Floating 3D Glass Card --- */
        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.5s;
            position: relative;
            overflow: hidden;
            animation: float 5s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .card:hover {
            border-color: var(--blue);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            animation-play-state: paused;
        }

        .card i { font-size: 50px; margin-bottom: 20px; color: var(--pink); }
        .card h3 { font-size: 22px; margin-bottom: 10px; color: white; }
        .price {
            font-size: 28px; font-weight: 700; color: var(--green);
            margin: 20px 0; display: block;
        }

        /* --- Neon Buttons --- */
        .buy-btn {
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(45deg, var(--pink), var(--red));
            color: white; font-weight: 800; cursor: pointer;
            text-decoration: none; display: inline-block;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);
            text-transform: uppercase;
        }

        .buy-btn:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 0 30px var(--pink);
        }

        /* --- Contact --- */
        .footer-contact {
            text-align: center; padding: 100px 5%;
            background: rgba(255,255,255,0.02);
            border-radius: 50px 50px 0 0;
        }

        .social-links {
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
            margin-top: 30px;
        }

        .s-btn {
            padding: 15px 35px; border-radius: 15px; text-decoration: none;
            color: white; font-weight: 700; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        .wa { background: #25d366; box-shadow: 0 0 20px #25d36655; }
        .tg { background: #0088cc; box-shadow: 0 0 20px #0088cc55; }

    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob blue"></div>
        <div class="blob green"></div>
    </div>

    <header>
        <div class="logo">MITZII STORE</div>
    </header>

    <section class="hero">
        <p>Premium Digital Inventory</p>
        <h1>EVOLUTION</h1>
        <p style="color: var(--pink);">OWNER: DEV MITZII</p>
    </section>

    <div class="section">
        <h2 class="category-title"><i class="fas fa-wifi"></i> ULTRA VPN</h2>
        <div class="grid">
            <div class="card" data-tilt>
                <i class="fas fa-globe-americas"></i>
                <h3>100GB VPN</h3>
                <span class="price">Rs. 300.00</span>
                <a href="#" onclick="order('100GB VPN', '300')" class="buy-btn">GET NOW</a>
            </div>
            <div class="card" data-tilt>
                <i class="fas fa-server"></i>
                <h3>500GB VPN</h3>
                <span class="price">Rs. 800.00</span>
                <a href="#" onclick="order('500GB VPN', '800')" class="buy-btn">GET NOW</a>
            </div>
            <div class="card" data-tilt style="border-color: var(--pink);">
                <i class="fas fa-infinity" style="color: var(--pink);"></i>
                <h3>UNLIMITED VPN</h3>
                <span class="price">Rs. 1150.00</span>
                <a href="#" onclick="order('Unlimited VPN', '1150')" class="buy-btn">GET NOW</a>
            </div>
        </div>
    </div>

    <div class="section">
        <h2 class="category-title" style="color: var(--pink); text-shadow: 0 0 10px var(--pink);">
            <i class="fas fa-robot"></i> BUG BOT LIST
        </h2>
        <div class="grid" id="bot-list">
            </div>
    </div>

    <div class="section">
        <h2 class="category-title" style="color: var(--blue); text-shadow: 0 0 10px var(--blue);">
            <i class="fas fa-terminal"></i> PTERODACTYL PANELS
        </h2>
        <div class="grid" id="panel-list">
            </div>
    </div>

    <section class="footer-contact">
        <h2>CONNECT WITH OWNER</h2>
        <div class="social-links">
            <a href="https://wa.me/message/X45CUX4LO3AQD1" class="s-btn wa"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
            <a href="https://t.me/CyberMitzii" class="s-btn tg"><i class="fab fa-telegram"></i> TELEGRAM</a>
        </div>
        <p style="margin-top: 40px; opacity: 0.5;">&copy; 2026 Mitzii Store | All rights reserved.</p>
    </section>

    <script>
        const bots = [
            {n: "Tredic Bug bot", p: "2300"}, {n: "Ovalium Bug bot", p: "2400"},
            {n: "Aphohis Bug bot", p: "2600"}, {n: "Applow Bug bot", p: "2200"},
            {n: "Otax Bug bot", p: "2300"}, {n: "Xinso Bug bot", p: "2300"},
            {n: "Lakiya Crasher", p: "2600"}, {n: "Tredic Bug apk", p: "2800"},
            {n: "Otax Bug Apk", p: "2800"}
        ];

        const panels = [
            {n: "UNLIMITED PANEL", p: "450"}, {n: "ADMIN PANEL", p: "1400"},
            {n: "PT PANEL RESELL ACCESS", p: "2600"}, {n: "OWNER PANEL", p: "3600"},
            {n: "BUG BOT DEPLOY", p: "450"}, {n: "MD BOT DEPLOY", p: "400"}
        ];

        function populate(data, id, icon) {
            const container = document.getElementById(id);
            data.forEach((item, index) => {
                container.innerHTML += `
                    <div class="card" data-tilt style="animation-delay: ${index * 0.2}s">
                        <i class="fas ${icon}"></i>
                        <h3>${item.n}</h3>
                        <span class="price">Rs. ${item.p}.00</span>
                        <a href="#" onclick="order('${item.n}', '${item.p}')" class="buy-btn">ORDER</a>
                    </div>
                `;
            });
        }

        populate(bots, 'bot-list', 'fa-bug');
        populate(panels, 'panel-list', 'fa-microchip');

        VanillaTilt.init(document.querySelectorAll(".card"), {
            max: 15, speed: 400, glare: true, "max-glare": 0.2
        });

        function order(item, price) {
            const text = encodeURIComponent(`Hi Dev Mitzii, I want to buy:\n📦 Item: ${item}\n💰 Price: Rs. ${price}\n\nPlease provide payment details.`);
            if(confirm("Order via WhatsApp? (Cancel for Telegram)")) {
                window.open(`https://wa.me/message/X45CUX4LO3AQD1?text=${text}`);
            } else {
                window.open(`https://t.me/CyberMitzii?text=${text}`);
            }
        }
    </script>
</body>
</html>
